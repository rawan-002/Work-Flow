<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>نظام إجراءات الدراسات العليا — المراحل</title><style>
:root{--ink:#23252b;--muted:#9398a4;--line:#e7e8ed;--bg:#f6f7f9;--card:#fff;--accent:#2563EB;--accent-soft:#E8F0FE}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI","Helvetica Neue",Arial,"Noto Sans Arabic",sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:1320px;margin:0 auto;padding:42px 26px 90px}
header.top .kick{font-size:13px;font-weight:800;color:var(--accent);letter-spacing:.5px;margin:0 0 8px}
header.top .brand{font-size:30px;font-weight:800;margin:0;letter-spacing:-.3px;color:var(--accent)}
header.top p.lead{color:var(--muted);font-size:15px;max-width:780px;margin:0}
.hint{margin:14px 0 0;font-size:13px;color:#6b7280;display:flex;flex-wrap:wrap;gap:6px 16px}
.hint b{color:var(--ink);font-weight:700}
.hint kbd{font-family:inherit;font-size:12px;background:#fff;border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:1px 6px}
.legend{display:flex;flex-wrap:wrap;gap:8px 20px;margin:20px 0 0;padding:15px 18px;background:var(--card);border:1px solid var(--line);border-radius:14px;font-size:13px;font-weight:600;color:#5a5e68}
.legend span{display:inline-flex;align-items:center;gap:8px}
.legend i.d{width:14px;height:14px;border-radius:50%;border:2px solid}
.legend i.d.dash{border-style:dashed}
.legend i.dia{width:14px;height:14px;background:#3B82F6;border:1.5px solid #2563EB;transform:rotate(45deg)}
.legend i.ln.loop{width:22px;height:0;border-top:2.5px dashed #94A3B8}
/* sticky nav */
.topnav{position:sticky;top:0;z-index:30;margin-top:26px;padding:10px 6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;
 background:rgba(246,247,249,.86);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.chip{font-size:13px;font-weight:700;color:#5a5e68;text-decoration:none;padding:6px 13px;border-radius:999px;border:1px solid var(--line);background:#fff;transition:.15s;min-width:34px;text-align:center}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
section{margin-top:50px}
.shead{display:flex;align-items:center;gap:14px;margin:0 0 20px}
.shead .bar{width:5px;height:42px;border-radius:6px;background:var(--accent)}
.shead h2{font-size:21px;font-weight:800;margin:0}
.shead p{margin:2px 0 0;color:var(--muted);font-size:13.5px;font-weight:600}
/* card */
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;margin:0 0 26px;padding:0;overflow:hidden;
 box-shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.05)}
.bar2{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);background:#fcfcfd}
.clabel{font-size:14px;font-weight:800;color:var(--ink)}
.tools{display:flex;align-items:center;gap:6px}
.tb{appearance:none;border:1px solid var(--line);background:#fff;color:#4a4e57;width:32px;height:32px;border-radius:9px;font-size:16px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.13s;line-height:1}
.tb:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.tb:active{transform:translateY(1px)}
.tb-close:hover{border-color:#E8543F;color:#E8543F;background:#fdecea}
.zlevel{font-size:12px;font-weight:700;color:var(--muted);min-width:42px;text-align:center;font-variant-numeric:tabular-nums}
.viewport{position:relative;overflow:hidden;background:repeating-linear-gradient(45deg,#fbfbfc 0 10px,#fafafb 10px 20px);cursor:grab;touch-action:pan-y}
.viewport.grabbing{cursor:grabbing}
.stage{transform-origin:0 0;will-change:transform}
.stage>svg{display:block;min-width:680px}
/* lightbox */
.lightbox{position:fixed;inset:0;z-index:100;background:rgba(20,22,28,.72);backdrop-filter:blur(4px);display:flex;flex-direction:column}
.lightbox[hidden]{display:none}
.lb-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;background:#fff;border-bottom:1px solid var(--line)}
.lb-title{font-size:15px;font-weight:800;color:var(--ink)}
.lb-vp{flex:1;overflow:hidden;background:repeating-linear-gradient(45deg,#f4f5f7 0 12px,#eef0f3 12px 24px);cursor:grab}
.lb-vp.grabbing{cursor:grabbing}
.lb-stage{transform-origin:0 0;will-change:transform}
.lb-stage>svg{display:block}
footer{margin-top:70px;text-align:center;color:var(--muted);font-size:12.5px}
@media(max-width:640px){header.top h1{font-size:24px}.wrap{padding:28px 14px 60px}.stage>svg{min-width:560px}}
@media print{.topnav,.tools,.hint,.lightbox{display:none!important}.viewport{overflow:visible;background:none}.stage{transform:none!important}.stage>svg{min-width:0;width:100%}.card{break-inside:avoid;box-shadow:none}}

pan class="lb-title"></span><div class="tools"><button class="tb" data-act="zoom-out" title="تصغير">&#8722;</button><span class="zlevel">100%</span><button class="tb" data-act="zoom-in" title="تكبير">+</button><button class="tb" data-act="reset" title="إعادة الضبط">&#8634;</button><button class="tb tb-close" data-act="lb-close" title="إغلاق (Esc)">&#10005;</button></div></div><div class="viewport lb-vp"><div class="stage lb-stage"></div></div></div><script>
(function(){
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  class PanZoom{
    constructor(vp,st,onChange){this.vp=vp;this.st=st;this.onChange=onChange;this.s=1;this.tx=0;this.ty=0;this.min=.45;this.max=7;this.drag=false;
      vp.addEventListener('wheel',e=>{ if(this.wheelAlways||e.ctrlKey||e.metaKey){e.preventDefault();this.zoomAt(e,e.deltaY<0?1.12:1/1.12);} },{passive:false});
      vp.addEventListener('pointerdown',e=>{this.drag=true;this.lx=e.clientX;this.ly=e.clientY;vp.classList.add('grabbing');try{vp.setPointerCapture(e.pointerId)}catch(_){}});
      vp.addEventListener('pointermove',e=>{if(!this.drag)return;this.tx+=e.clientX-this.lx;this.ty+=e.clientY-this.ly;this.lx=e.clientX;this.ly=e.clientY;this.apply();});
      const up=()=>{this.drag=false;vp.classList.remove('grabbing');};
      vp.addEventListener('pointerup',up);vp.addEventListener('pointercancel',up);window.addEventListener('pointerup',up);
      vp.addEventListener('dblclick',e=>{e.preventDefault();this.zoomAt(e,1.6);});
      this.apply();}
    apply(){this.st.style.transform='translate('+this.tx+'px,'+this.ty+'px) scale('+this.s+')';if(this.onChange)this.onChange(this.s);}
    zoomAt(e,f){const r=this.vp.getBoundingClientRect();const px=e.clientX-r.left,py=e.clientY-r.top;const ns=clamp(this.s*f,this.min,this.max);const k=ns/this.s;this.tx=px-(px-this.tx)*k;this.ty=py-(py-this.ty)*k;this.s=ns;this.apply();}
    zoomBy(f){const r=this.vp.getBoundingClientRect();this.zoomAt({clientX:r.left+r.width/2,clientY:r.top+r.height/2},f);}
    reset(){this.s=1;this.tx=0;this.ty=0;this.apply();}
  }
  function pct(s){return Math.round(s*100)+'%';}
  function toArabic(str){const w='0123456789',a='0123456789';return str.replace(/[0-9]/g,d=>a[w.indexOf(d)]);}
  function downloadSvg(svg,name){const x=new XMLSerializer().serializeToString(svg);
    const blob=new Blob(['<?xml version="1.0" encoding="UTF-8"?>\n'+x],{type:'image/svg+xml;charset=utf-8'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),1500);}

  // wire each card
  document.querySelectorAll('.card').forEach(card=>{
    const vp=card.querySelector('.viewport'),st=card.querySelector('.stage'),zl=card.querySelector('.zlevel');
    const pz=new PanZoom(vp,st,s=>{zl.textContent=toArabic(pct(s));});
    card.querySelectorAll('[data-act]').forEach(b=>b.addEventListener('click',()=>{
      const a=b.dataset.act;
      if(a==='zoom-in')pz.zoomBy(1.3);
      else if(a==='zoom-out')pz.zoomBy(1/1.3);
      else if(a==='reset')pz.reset();
      else if(a==='download')downloadSvg(card.querySelector('.stage>svg'),card.dataset.file);
      else if(a==='fullscreen')openLB(card);
    }));
  });

  // lightbox
  const lb=document.getElementById('lb'),lbVp=lb.querySelector('.lb-vp'),lbStage=lb.querySelector('.lb-stage'),
        lbTitle=lb.querySelector('.lb-title'),lbZ=lb.querySelector('.zlevel');
  let lbPz=null,state=null,curCard=null;
  lbPz=new PanZoom(lbVp,lbStage,s=>{lbZ.textContent=toArabic(pct(s));});lbPz.wheelAlways=true;
  function openLB(card){
    const svg=card.querySelector('.stage>svg');const ph=document.createComment('ph');
    svg.parentNode.replaceChild(ph,svg);lbStage.appendChild(svg);
    state={svg,ph};curCard=card;lbTitle.textContent=card.dataset.title;
    lb.hidden=false;document.body.style.overflow='hidden';lbPz.reset();
  }
  function closeLB(){if(!state)return;state.ph.parentNode.replaceChild(state.svg,state.ph);
    lb.hidden=true;document.body.style.overflow='';state=null;curCard=null;}
  lb.querySelectorAll('[data-act]').forEach(b=>b.addEventListener('click',()=>{
    const a=b.dataset.act;
    if(a==='zoom-in')lbPz.zoomBy(1.3);else if(a==='zoom-out')lbPz.zoomBy(1/1.3);
    else if(a==='reset')lbPz.reset();else if(a==='lb-close')closeLB();
  }));
  lb.addEventListener('click',e=>{if(e.target===lb)closeLB();});
  window.addEventListener('keydown',e=>{
    if(lb.hidden)return;
    if(e.key==='Escape')closeLB();
    else if(e.key==='+'||e.key==='=')lbPz.zoomBy(1.3);
    else if(e.key==='-'||e.key==='_')lbPz.zoomBy(1/1.3);
    else if(e.key==='0')lbPz.reset();
  });

  // active chip on scroll
  const chips=[...document.querySelectorAll('.chip')];
  const map={};chips.forEach(c=>map[c.dataset.target]=c);
  const obs=new IntersectionObserver(es=>{
    es.forEach(en=>{if(en.isIntersecting){chips.forEach(c=>c.classList.remove('active'));
      const c=map[en.target.id];if(c)c.classList.add('active');}});
  },{rootMargin:'-45% 0px -50% 0px',threshold:0});
  document.querySelectorAll('.card').forEach(c=>obs.observe(c));
})();
